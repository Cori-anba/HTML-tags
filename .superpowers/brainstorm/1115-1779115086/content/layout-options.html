<h2>整体布局方向确认</h2>
<p class="subtitle">三种侧边栏 + 内容区布局风格，你更喜欢哪一种？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>简约清新风</h3>
      <p>白色背景为主，浅灰色侧边栏，蓝色系强调色。清爽、专业，类似 MDN 文档风格。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>暗色专业风</h3>
      <p>深色侧边栏 + 白色内容区，高对比度，适合长时间阅读。类似 VS Code 文档风格。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>暖色护眼风</h3>
      <p>暖色调背景，柔和的颜色搭配，减少视觉疲劳。适合长时间查阅参考手册。</p>
    </div>
  </div>
</div>
